      "post": {
        "summary": "Criar usuário",
        "description": "",
        "operationId": "criar-usuario",
        "parameters": [
          {
            "name": "isInvite",
            "in": "query",
            "description": "Caso Seja para enviar um convite (true), nesse caso não é necessário definir o campo *password*",
            "required": true,
            "schema": {
              "type": "boolean",
              "default": false
            }
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "name",
                  "email",
                  "role",
                  "_businesses"
                ],
                "properties": {
                  "name": {
                    "type": "string",
                    "description": "Nome do Usuário",
                    "default": "João da Silva"
                  },
                  "email": {
                    "type": "string",
                    "description": "E-mail do Usuário (deve ser verificado se já possui um usuário antes com esse e-email, caso existe, não irá permitir a criação",
                    "default": "teste@exemple.com"
                  },
                  "phone": {
                    "type": "string"
                  },
                  "password": {
                    "type": "string",
                    "description": "Senha do usuário (obrigatório) em casos de não possuir autenticação direta no servidor de sua empresa",
                    "default": "Senha Plain Text"
                  },
                  "role": {
                    "type": "string",
                    "default": "pdv",
                    "enum": [
                      "readonly",
                      "pdv",
                      "ana",
                      "adm",
                      "own"
                    ]
                  },
                  "picture": {
                    "type": "string",
                    "description": "URL da Foto do Usuário",
                    "default": "https://"
                  },
                  "_businesses": {
                    "type": "array",
                    "description": "Lista com os Ids das Unidades para dar permissão ao Usuário, se vazio, irá adicionar todas.",
                    "default": [
                      "[\"6287abb2ec1259b0a5d75f99\"]"
                    ],
                    "items": {
                      "type": "string"
                    }
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "200",
            "content": {
              "application/json": {
                "examples": {
                  "Result": {
                    "value": "{\n  \"_id\": \"6287aba50f06ef0bdf789aa2\",\n  \"name\": \"Nome do Usuário\",\n  \"email\": \"email@dousuario.com\",\n  \"active\": true,\n  \"role\": \"own\",\n  \"_empresa\": \"6287abaef6ee66d309ab00b1\",\n  \"_businesses\": [\n    \"6287abb2ec1259b0a5d75f99\"\n  ]\n}"
                  }
                },
                "schema": {
                  "type": "object",
                  "properties": {
                    "_id": {
                      "type": "string",
                      "example": "6287aba50f06ef0bdf789aa2"
                    },
                    "name": {
                      "type": "string",
                      "example": "Nome do Usuário"
                    },
                    "email": {
                      "type": "string",
                      "example": "email@dousuario.com"
                    },
                    "active": {
                      "type": "boolean",
                      "example": true,
                      "default": true
                    },
                    "role": {
                      "type": "string",
                      "example": "own"
                    },
                    "_empresa": {
                      "type": "string",
                      "example": "6287abaef6ee66d309ab00b1"
                    },
                    "_businesses": {
                      "type": "array",
                      "items": {
                        "type": "string",
                        "example": "6287abb2ec1259b0a5d75f99"
                      }
                    }
                  }
                }
              }
            }
          },
          "400": {
            "description": "400",
