    "/partners/review/summary": {
      "get": {
        "summary": "Resumo de Avaliações",
        "description": "Endpoint que retorna um resumo das avaliações online. Utilize o Token fornecido na página de configurações da Amplifique.me para rodar essa requisição GET.",
        "operationId": "resumo-de-avaliacoes",
        "parameters": [
          {
            "name": "limit",
            "in": "query",
            "description": "Número de avaliações a serem mostradas. Default: 5, Min: 0, Max: 15",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 5
            }
          },
          {
            "name": "rateMin",
            "in": "query",
            "description": "Score Mínimo Exigido para mostrar as avaliações. Default: 0, Min: 0, Max: 5",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 0
            }
          },
          {
            "name": "rateMax",
            "in": "query",
            "description": "Score Máximo para mostrar as avaliações. Default: 5, Min: 0, Max: 5",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 5
            }
          },
          {
            "name": "page",
            "in": "query",
            "description": "Página para mostrar",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 0
            }
          },
          {
            "name": "only_text",
            "in": "query",
            "description": "Apenas avaliações com texto ou não",
            "schema": {
              "type": "boolean",
              "default": false
            }
          },
          {
            "name": "dateMin",
            "in": "query",
            "description": "Data Mínima da avaliação: Ex: 01/01/2020 (DD/MM/YYYY)",
            "schema": {
              "type": "string",
              "default": "01/01/2020"
            }
          },
          {
            "name": "dateMax",
            "in": "query",
            "description": "Data Máxima da avaliação: Ex: 01/01/2022 (DD/MM/YYYY)",
            "schema": {
              "type": "string",
              "default": "01/01/2022"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "200",
            "content": {
              "application/json": {
                "examples": {
                  "Result": {
                    "value": "{\n  \"summary\": {\n    \"expedia\": {\n      \"average\": 4.66,\n      \"reviews\": 65\n    },\n    \"facebook\": {\n      \"average\": 5,\n      \"reviews\": 1\n    },\n    \"google\": {\n      \"average\": 4.86,\n      \"reviews\": 28\n    },\n    \"total\": {\n      \"average\": 4.84,\n      \"reviews\": 94\n    }\n  },\n  \"reviews\": [\n    {\n      \"Reviewer\": {\n        \"name\": \"João da Silval\"\n      },\n      \"network\": \"expedia\",\n      \"created_at\": \"2020-03-10T00:46:56.000Z\",\n      \"message\": \"Ótima opção em Ponta Grossa.\\n Hotel novo, limpo e bem localizado. Quarto espaçoso. Cama confortável. Funcionários atenciosos. Estacionamento e wi-fi bons. Café da manhã muito saboroso. Ótimo custo-benefício. \",\n      \"rate\": 5\n    },\n    {\n      \"Reviewer\": {\n        \"name\": \"João da Silva\"\n      },\n      \"network\": \"expedia\",\n      \"created_at\": \"2020-01-19T03:35:12.000Z\",\n      \"message\": \"Ótimo.\\n Ótima. Hotel impecável eee com excelentes profissionais.\",\n      \"rate\": 5,\n      \"reply\": \"obrigado guilhrtmr\"\n    },\n    {\n      \"Reviewer\": {\n        \"name\": \"João da Silva\"\n      },\n      \"network\": \"google\",\n      \"created_at\": \"2019-12-31T13:54:12.000Z\",\n      \"message\": \"Tudo de Bom.\\n Fomos super bem recebidos, desde o estacionamento ate o check out. Equipe atenciosa. Ja faz toda diferença ao chegar cansado, e receber um sorriso e auxilio para qualquer coisa que precise.\",\n      \"rate\": 5\n    },\n    {\n      \"Reviewer\": {\n        \"name\": \"João da Silva\"\n      },\n      \"created_at\": \"2019-11-11T14:22:51.000Z\",\n      \"rate\": 5,\n      \"message\": \"Nota 1.000.\\n Conforto, higiene, localização, valor, tudo excelente. Retornarei com certeza. \",\n      \"network\": \"facebook\"\n    },\n    {\n      \"Reviewer\": {\n        \"name\": \"João da Silva\"\n      },\n      \"created_at\": \"2019-09-23T14:45:04.000Z\",\n      \"rate\": 3,\n      \"message\": \"Não voltaria lá.\\n Quarto pequeno, banheiro minúsculo, o colchão da cama de casal parecia que as partes do pé ficava mais alto que a cabeça. Horrível, é limpo decorado, café da manhã bom\",\n      \"network\": \"booking\"\n    }\n  ]\n}"
                  }
                },
                "schema": {
                  "type": "object",
                  "properties": {
                    "summary": {
                      "type": "object",
                      "properties": {
                        "expedia": {
                          "type": "object",
                          "properties": {
                            "average": {
                              "type": "number",
                              "example": 4.66,
                              "default": 0
                            },
                            "reviews": {
                              "type": "integer",
                              "example": 65,
                              "default": 0
                            }
                          }
                        },
                        "facebook": {
                          "type": "object",
                          "properties": {
                            "average": {
                              "type": "integer",
                              "example": 5,
                              "default": 0
                            },
                            "reviews": {
