  "paths": {
    "/partners/cf": {
      "post": {
        "summary": "Requisição de Pesquisa Customer Feedback",
        "description": "",
        "operationId": "pesquisa-customer-feedback",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "name",
                  "email"
                ],
                "properties": {
                  "name": {
                    "type": "string",
                    "description": "Nome e/ou Sobrenome do cliente Ex: João da Silva",
                    "default": "João da Silva"
                  },
                  "email": {
                    "type": "string",
                    "description": "Email do seu cliente Ex: teste@example.com",
                    "default": "teste@example.com"
                  },
                  "phone": {
                    "type": "string",
                    "description": "Telefone do seu cliente no padrão E.164. Ex: +5542999999999",
                    "default": "+5542999999999"
                  },
                  "company": {
                    "type": "string",
                    "description": "*Opcional* Nome da Empresa que o cliente faz parte. Ex: Empresa Teste",
                    "default": "Empresa Teste"
                  },
                  "companyDocument": {
                    "type": "string",
                    "description": "*Opcional* CNPJ da Empresa que o cliente faz parte. Ex:00.000.000/0000-00",
                    "default": "XX.XXX.XXX/XXXX-XX"
                  },
                  "channel": {
                    "type": "string",
                    "description": "*Opcional* Identificador do canal para envio. Opções: `sms` `email` `wa-api` Para receber apenas o link no retorno envie `wa-link`",
                    "default": "email"
                  },
                  "customerId": {
                    "type": "string",
                    "description": "*Opcional* Identificador interno do seu Software para o Cadastro do cliente. Ex. Código do Cliente",
                    "default": "123"
                  },
                  "transactionId": {
                    "type": "string",
                    "description": "*Opcional* Identificador interno da transação do seu cliente. Ex. Código da venda.",
                    "default": "1234"
                  },
                  "custom_fields": {
                    "type": "object",
                    "description": "*Opcional*  Objeto JSON com parâmetros adicionais Ex: {\"regiao\":\"SUL\", \"vendedor\":\"Teste Exemplo Da Silva\"",
                    "properties": {
                      "regiao": {
                        "type": "string",
                        "description": "Exemplo de customField regiao",
                        "default": "Sul"
                      }
                    }
                  },
                  "expiration": {
                    "type": "integer",
                    "description": "*Opcional* Define a expiração em dias do link da solicitação, mínimo 0 máximo 90.",
                    "default": 0,
                    "format": "int32"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "200",
            "content": {
              "application/json": {
                "examples": {
                  "sms/e-mail": {
                    "value": "{\n  \"_id\": \"62eabd08db91f8fba6ff2159\",\n  \"customer\": {\n    \"_id\": \"62eabbaeaea4eba9b7284549\",\n    \"email\": \"robson@ampl.me\",\n    \"phone\": \"+5542999613014\"\n  }\n}"
                  },
                  "wa-link": {
                    "value": "{\n  \"_id\": \"62eabd08db91f8fba6ff2159\",\n  \"customer\": {\n    \"_id\": \"62eabbaeaea4eba9b7284549\",\n    \"email\": \"teste@example.com\",\n    \"phone\": \"+5542999999999\"\n  },\n  \"link\": {\n    \"shortUrl\": \"https://ampl.me/aKTX9BfbY\",\n    \"originalUrl\": \"https://surveys.amplifique.me/answer/62eabd09db91f8fba6ff215f\",\n    \"urlCode\": \"aKTX9BfbY\",\n    \"updatedAt\": \"2022-08-03T18:23:06.399Z\",\n    \"shortners\": 1,\n    \"id\": \"4859907340238848\"\n  }\n}"
                  }
                },
                "schema": {
                  "oneOf": [
                    {
                      "title": "sms/e-mail",
                      "type": "object",
                      "properties": {
                        "_id": {
                          "type": "string",
                          "example": "62eabd08db91f8fba6ff2159"
                        },
                        "customer": {
                          "type": "object",
                          "properties": {
                            "_id": {
                              "type": "string",
                              "example": "62eabbaeaea4eba9b7284549"
                            },
                            "email": {
                              "type": "string",
                              "example": "robson@ampl.me"
                            },
                            "phone": {
                              "type": "string",
                              "example": "+5542999613014"
                            }
                          }
                        }
                      }
                    },
                    {
                      "title": "wa-link",
                      "type": "object",
                      "properties": {
                        "_id": {
                          "type": "string",
                          "example": "62eabd08db91f8fba6ff2159"
                        },
                        "customer": {
                          "type": "object",
                          "properties": {
                            "_id": {
                              "type": "string",
                              "example": "62eabbaeaea4eba9b7284549"
                            },
                            "email": {
                              "type": "string",
                              "example": "teste@example.com"
                            },
                            "phone": {
                              "type": "string",
                              "example": "+5542999999999"
                            }
                          }
                        },
                        "link": {
                          "type": "object",
                          "properties": {
                            "shortUrl": {
                              "type": "string",
                              "example": "https://ampl.me/aKTX9BfbY"
                            },
                            "originalUrl": {
                              "type": "string",
                              "example": "https://surveys.amplifique.me/answer/62eabd09db91f8fba6ff215f"
                            },
                            "urlCode": {
                              "type": "string",
                              "example": "aKTX9BfbY"
                            },
                            "updatedAt": {
                              "type": "string",
                              "example": "2022-08-03T18:23:06.399Z"
                            },
                            "shortners": {
                              "type": "integer",
                              "example": 1,
                              "default": 0
                            },
                            "id": {
                              "type": "string",
                              "example": "4859907340238848"
                            }
                          }
                        }
                      }
                    }
                  ]
                }
              }
            }
          }
        },
        "deprecated": false
      }
    },
